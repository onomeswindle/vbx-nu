<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #0A0A0A; color: #E8E3D8;

    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
  }
  body { overflow-x: hidden; }
  a { color: inherit; }
  ::selection { background: #C8362F; color: #E8E3D8; }

  /* Red-square class handle for tweaks override */
  span[data-red-square] { background: #C8362F; }

  /* Nicer input placeholder */
  input::placeholder { color: rgba(232,227,216,0.35); }

  /* Reduce motion for anyone who asks */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { transition: none !important; animation: none !important; }
  }

  /* Hide horizontal scrollbars introduced by overflow effects */
  body::-webkit-scrollbar { width: 10px; }
  body::-webkit-scrollbar-track { background: #0A0A0A; }
  body::-webkit-scrollbar-thumb { background: #2a2a2a; }
</style>
